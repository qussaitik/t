<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم المصيبة | تأكيد الطلب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #ff7675;
            --bg: #f8f9fd;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #2d3436;
            overflow: hidden;
            padding: 20px;
        }

        .order-card {
            background: var(--white);
            padding: 45px 30px;
            border-radius: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 25px 50px rgba(108, 92, 231, 0.08);
            animation: fadeInUp 0.7s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .service-badge { 
            background: #f0eeff; 
            color: var(--primary); 
            padding: 12px 25px; 
            border-radius: 50px; 
            font-weight: 800; 
            font-size: 15px; 
            margin-bottom: 25px; 
            display: inline-block;
            border: 1px solid rgba(108, 92, 231, 0.1);
        }

        h2 { font-weight: 900; font-size: 24px; margin-bottom: 30px; color: #2d3436; }

        .input-group { margin-bottom: 20px; position: relative; }
        
        input {
            width: 100%; padding: 18px; border-radius: 20px; 
            border: 2px solid #f1f1f1;
            background: #fafafa; 
            color: #2d3436; text-align: center;
            font-family: 'Tajawal'; font-size: 16px; transition: 0.3s;
            outline: none;
        }
        
        input:focus { border-color: var(--primary); background: var(--white); }

        button {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-weight: 900; font-size: 19px; cursor: pointer;
            transition: 0.4s; margin-top: 10px;
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.2);
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(108, 92, 231, 0.3); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .back-link { 
            display: inline-block; margin-top: 25px; 
            color: #b2bec3; text-decoration: none; 
            font-size: 14px; transition: 0.3s;
            font-weight: 700;
        }
        .back-link:hover { color: var(--primary); }
        
        .icon-box { font-size: 40px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="order-card">
        <div class="icon-box">🚀</div>
        <div id="service-name" class="service-badge">جاري جلب الخدمة...</div>
        <h2>أكمل تفاصيل طلبك</h2>
        
        <div class="input-group">
            <input type="text" id="link" placeholder="أدخل رابط الحساب أو الفيديو" autocomplete="off">
        </div>
        
        <div class="input-group">
            <input type="number" id="quantity" placeholder="الكمية المطلوبة (أرقام فقط)">
        </div>

        <button id="submit-btn" onclick="processOrder()">
            <i class="fas fa-check-circle"></i> تأكيد وإرسال
        </button>
        
        <a href="services.html" class="back-link">
            <i class="fas fa-arrow-right"></i> العودة لقائمة الخدمات
        </a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDH4h6Dg1DM9xGLc8x7mUaqnVICBf6HnNk",
            authDomain: "al-musaiba.firebaseapp.com",
            databaseURL: "https://al-musaiba-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "al-musaiba",
            storageBucket: "al-musaiba.firebasestorage.app",
            messagingSenderId: "693047037412",
            appId: "1:693047037412:web:9d3f3ab7831ac35cd80bf1"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const service = localStorage.getItem('chosenService');
        const user = localStorage.getItem('user');

        if(!service) window.location.href = "services.html";
        document.getElementById('service-name').innerText = "الخدمة: " + service;

        const prices = {
            "متابعين تيك توك": 5,
            "مشاهدات تيك توك": 0.1,
            "إعجابات تيك توك": 0.1,
            "متابعين إنستغرام": 3,
            "متابعين فيسبوك": 4,
            "متابعين يوتيوب": 15
        };

        async function processOrder() {
            const linkValue = document.getElementById('link').value.trim();
            const qtyValue = parseInt(document.getElementById('quantity').value);
            
            if(!linkValue || isNaN(qtyValue) || qtyValue <= 0) {
                return alert("يا غالي، عبي الرابط والكمية صح!");
            }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري فحص الرصيد...';

            const pricePerThousand = prices[service] || 0;
            const totalCost = (pricePerThousand / 1000) * qtyValue;

            database.ref('users/' + user).once('value').then((snapshot) => {
                const userData = snapshot.val();
                const currentBalance = userData.balance || 0;

                if (currentBalance < totalCost) {
                    alert(`⚠️ رصيدك غير كافٍ!\nالتكلفة: $${totalCost.toFixed(4)}\nرصيدك: $${currentBalance.toFixed(4)}`);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check-circle"></i> تأكيد وإرسال';
                } else {
                    const newBalance = currentBalance - totalCost;
                    const orderId = Date.now();

                    const orderData = {
                        orderId: orderId,
                        user: user,
                        service: service,
                        link: linkValue,
                        qty: qtyValue,
                        cost: totalCost,
                        status: "قيد التنفيذ",
                        date: new Date().toLocaleString()
                    };

                    const updates = {};
                    updates['/users/' + user + '/balance'] = newBalance;
                    updates['/orders/' + orderId] = orderData;
                    updates['/user_orders/' + user + '/' + orderId] = orderData;

                    database.ref().update(updates).then(() => {
                        alert("✅ تم تسجيل الطلب وخصم الرصيد بنجاح!");
                        window.location.href = `https://wa.me/972555630038?text=طلب جديد مدفوع💰%0A👤 المستخدم: ${user}%0A🛠️ الخدمة: ${service}%0A🔢 الكمية: ${qtyValue}%0A🔗 الرابط: ${linkValue}%0A💵 التكلفة: $${totalCost.toFixed(4)}`;
                    });
                }
            }).catch((err) => {
                alert("❌ حدث خطأ في النظام");
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
