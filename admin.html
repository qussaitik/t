<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة العمليات | عالم المصيبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --primary: #8e44ad; 
            --secondary: #2ecc71; 
            --bg: #0f0f13; 
            --card-bg: #1a1a20;
            --text: #e0e0e0;
            --danger: #e74c3c; 
            --accent: #6c5ce7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            min-height: 100vh; padding: 20px;
            line-height: 1.6;
        }

        /* شاشة الدخول الفخمة */
        #admin-login {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 10000; display: flex;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .login-box {
            background: var(--card-bg); padding: 40px; border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
            width: 90%; max-width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .login-box i { font-size: 50px; color: var(--accent); margin-bottom: 20px; }
        .login-box input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333;
            background: #111; color: white; text-align: center; font-size: 18px; margin-bottom: 20px;
        }
        .btn-login { 
            width: 100%; padding: 12px; border-radius: 12px; border: none;
            background: var(--accent); color: white; font-weight: 900; cursor: pointer;
        }

        .container { max-width: 1000px; margin: 0 auto; display: none; animation: fadeIn 0.5s ease; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        header h1 { font-weight: 900; color: var(--accent); font-size: 24px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; background: var(--card-bg); padding: 5px; border-radius: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: transparent; color: #888; cursor: pointer; font-weight: bold; font-family: 'Tajawal'; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: white; }

        .content-section { display: none; }
        .content-section.active { display: block; }

        /* الكروت المحسنة */
        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 20px; 
            margin-bottom: 15px; border: 1px solid #25252b; transition: 0.3s;
        }
        .card:hover { border-color: var(--accent); }

        .flex-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        
        .user-tag { background: #25252b; padding: 5px 12px; border-radius: 8px; font-weight: bold; color: var(--accent); }
        
        .controls { display: flex; gap: 8px; align-items: center; margin-top: 15px; }
        input[type="number"], input[type="text"], select { 
            background: #111; border: 1px solid #333; color: white; 
            padding: 8px 12px; border-radius: 8px; font-family: 'Tajawal';
        }

        .btn { border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Tajawal'; transition: 0.2s; }
        .btn-save { background: var(--secondary); color: #052c14; }
        .btn-del { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .btn-del:hover { background: var(--danger); color: white; }
        .btn-logout { background: #333; color: white; font-size: 12px; }

        .order-info { font-size: 13px; color: #aaa; margin: 10px 0; background: #111; padding: 10px; border-radius: 10px; }
        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="admin-login">
    <div class="login-box">
        <i class="fas fa-shield-alt"></i>
        <h2 style="margin-bottom:20px">غرفة العمليات</h2>
        <input type="password" id="adminPass" placeholder="رمز الدخول الخاص">
        <button class="btn-login" onclick="checkAdmin()">دخول النظام</button>
    </div>
</div>

<div class="container" id="main-content">
    <header>
        <h1><i class="fas fa-user-crown"></i> إدارة عالم المصيبة</h1>
        <button class="btn btn-logout" onclick="adminLogout()">خروج</button>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('users-tab', this)"><i class="fas fa-users"></i> المشتركين</button>
        <button class="tab-btn" onclick="showTab('orders-tab', this)"><i class="fas fa-shopping-cart"></i> الطلبات</button>
    </div>

    <div id="users-tab" class="content-section active">
        <div id="users-list"></div>
    </div>

    <div id="orders-tab" class="content-section">
        <button onclick="clearOrders()" class="btn btn-del" style="width:100%; margin-bottom:20px; padding:15px">
            <i class="fas fa-trash"></i> مسح سجل الطلبات بالكامل
        </button>
        <div id="orders-list"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDH4h6Dg1DM9xGLc8x7mUaqnVICBf6HnNk",
        authDomain: "al-musaiba.firebaseapp.com",
        databaseURL: "https://al-musaiba-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "al-musaiba",
        storageBucket: "al-musaiba.firebasestorage.app",
        messagingSenderId: "693047037412",
        appId: "1:693047037412:web:9d3f3ab7831ac35cd80bf1"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkAdmin() {
        const pass = document.getElementById('adminPass').value;
        if(pass === '0598787757') {
            sessionStorage.setItem('isBoss', 'true');
            document.getElementById('admin-login').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            startLiveUpdate();
        } else { alert("الرمز غلط يا غالي"); }
    }

    function adminLogout() { sessionStorage.clear(); location.reload(); }

    function showTab(id, btn) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function startLiveUpdate() {
        // إدارة المستخدمين بكل الميزات
        db.ref('users').on('value', (snap) => {
            const users = snap.val();
            let html = "";
            for(let u in users) {
                const isBanned = users[u].status === 'محظور';
                html += `
                <div class="card">
                    <div class="flex-row">
                        <span class="user-tag">👤 ${u}</span>
                        <select onchange="updateUserField('${u}', 'status', this.value)" style="border-color: ${isBanned ? 'var(--danger)' : 'var(--secondary)'}">
                            <option value="نشط" ${!isBanned ? 'selected' : ''}>✅ نشط</option>
                            <option value="محظور" ${isBanned ? 'selected' : ''}>🚫 حظر</option>
                        </select>
                    </div>
                    <div class="controls flex-row">
                        <span>💰 رصيد: <input type="number" id="bal_${u}" value="${users[u].balance}" style="width:80px"></span>
                        <span>🔑 سر: <input type="text" id="pass_${u}" value="${users[u].password}" style="width:100px"></span>
                        <div style="display:flex; gap:5px">
                            <button class="btn btn-save" onclick="saveUserData('${u}')">حفظ</button>
                            <button class="btn btn-del" onclick="deleteAccount('${u}')"><i class="fas fa-user-times"></i></button>
                        </div>
                    </div>
                </div>`;
            }
            document.getElementById('users-list').innerHTML = html;
        });

        // إدارة الطلبات
        db.ref('orders').on('value', (snap) => {
            const orders = snap.val();
            if(!orders) { document.getElementById('orders-list').innerHTML = "لا يوجد طلبات"; return; }
            const arr = Object.values(orders).reverse();
            let html = arr.map(o => `
                <div class="card">
                    <div class="flex-row">
                        <b style="color:var(--accent)">${o.service}</b>
                        <small>${o.date}</small>
                    </div>
                    <div class="order-info">
                        يوزر: ${o.user} | كمية: ${o.qty} <br>
                        رابط: <a href="${o.link}" target="_blank" style="color:var(--accent)">اضغط لفتح الرابط</a>
                    </div>
                    <div class="flex-row">
                        <select id="st_${o.orderId}">
                            <option value="قيد التنفيذ" ${o.status === 'قيد التنفيذ' ? 'selected' : ''}>⏳ قيد التنفيذ</option>
                            <option value="مكتمل" ${o.status === 'مكتمل' ? 'selected' : ''}>✅ مكتمل</option>
                            <option value="ملغي" ${o.status === 'ملغي' ? 'selected' : ''}>❌ ملغي</option>
                        </select>
                        <button class="btn btn-save" onclick="updateOrderStatus('${o.user}', '${o.orderId}')">تحديث الحالة</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('orders-list').innerHTML = html;
        });
    }

    function saveUserData(u) {
        const b = parseFloat(document.getElementById('bal_'+u).value);
        const p = document.getElementById('pass_'+u).value;
        db.ref('users/' + u).update({ balance: b, password: p }).then(() => alert("تم حفظ بيانات " + u));
    }

    function updateUserField(u, field, val) {
        db.ref('users/' + u).update({ [field]: val });
    }

    function deleteAccount(u) {
        if(confirm("بدك تمسح حساب " + u + " نهائياً؟")) {
            db.ref('users/' + u).remove();
        }
    }

    function updateOrderStatus(u, id) {
        const s = document.getElementById('st_' + id).value;
        const updates = {};
        updates['/orders/' + id + '/status'] = s;
        updates['/user_orders/' + u + '/' + id + '/status'] = s;
        db.ref().update(updates).then(() => alert("تم التحديث"));
    }

    function clearOrders() {
        if(confirm("سيتم حذف جميع سجلات الطلبات! هل أنت متأكد؟")) {
            db.ref('orders').remove();
            db.ref('user_orders').remove();
        }
    }
</script>
</body>
</html>
