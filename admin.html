<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة العمليات | عالم المصيبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --primary: #6c5ce7; --secondary: #00b894; --bg: #f8f9fd; 
            --white: #ffffff; --danger: #ff7675; --text: #2d3436; --gold: #f1c40f;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }

        /* شاشة الدخول */
        #admin-login { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--white); padding: 50px 40px; border-radius: 40px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 25px 50px rgba(108, 92, 231, 0.1); }
        .login-box input { width: 100%; padding: 18px; border-radius: 20px; border: 2px solid #f1f1f1; margin-bottom: 20px; text-align: center; }
        .btn-login { width: 100%; padding: 18px; border-radius: 20px; border: none; background: linear-gradient(135deg, var(--primary), #a29bfe); color: white; font-weight: 900; cursor: pointer; }

        .container { max-width: 900px; margin: 0 auto; display: none; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; background: #eeefff; padding: 7px; border-radius: 20px; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 14px; border: none; border-radius: 15px; background: transparent; color: #7f8c8d; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .tab-btn.active { background: var(--white); color: var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        .content-section { display: none; }
        .content-section.active { display: block; }
        .card { background: var(--white); padding: 25px; border-radius: 30px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(108, 92, 231, 0.05); }
        .flex-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .btn { border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; font-family: 'Tajawal'; }
        .btn-save { background: var(--secondary); color: white; }
        .btn-del { background: #fff1f0; color: var(--danger); }
        input, select { background: #fafafa; border: 2px solid #f1f1f1; padding: 10px; border-radius: 12px; }
        .price-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f1f1; }
    </style>
</head>
<body>

<div id="admin-login">
    <div class="login-box">
        <i class="fas fa-user-shield" style="font-size:50px; color:var(--primary); margin-bottom:20px;"></i>
        <h2>غرفة العمليات</h2>
        <input type="password" id="adminPass" placeholder="رمز الدخول">
        <button class="btn-login" onclick="checkAdmin()">دخول</button>
    </div>
</div>

<div class="container" id="main-content">
    <header>
        <h1 style="font-weight:900; color:var(--primary);">🔐 لوحة التحكم</h1>
        <button class="btn" style="background:white; color:var(--danger);" onclick="location.reload()">خروج</button>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('users-tab', this)">الرادار</button>
        <button class="tab-btn" onclick="showTab('prices-tab', this)">الأسعار</button>
        <button class="tab-btn" onclick="showTab('orders-tab', this)">الطلبات</button>
        <button class="tab-btn" onclick="showTab('ticker-tab', this)">الشريط</button>
    </div>

    <div id="users-tab" class="content-section active"><div id="users-list"></div></div>

    <div id="prices-tab" class="content-section">
        <div class="card">
            <h3 style="color:var(--primary); margin-bottom:15px;">💰 تعديل الأسعار (لكل 1000)</h3>
            <div class="price-item"><span>تيك توك متابعين:</span> <input type="number" step="0.1" id="p_tt_f"></div>
            <div class="price-item"><span>تيك توك مشاهدات:</span> <input type="number" step="0.1" id="p_tt_v"></div>
            <div class="price-item"><span>تيك توك إعجابات:</span> <input type="number" step="0.1" id="p_tt_l"></div>
            <div class="price-item"><span>إنستغرام متابعين:</span> <input type="number" step="0.1" id="p_ig_f"></div>
            <div class="price-item"><span>فيسبوك متابعين:</span> <input type="number" step="0.1" id="p_fb_f"></div>
            <div class="price-item"><span>يوتيوب مشتركين:</span> <input type="number" step="0.1" id="p_yt_s"></div>
            <button class="btn btn-save" style="width:100%; margin-top:20px; padding:15px;" onclick="saveAllPrices()">حفظ الأسعار 🔥</button>
        </div>
    </div>

    <div id="orders-tab" class="content-section">
        <button onclick="clearOrders()" class="btn btn-del" style="width:100%; margin-bottom:20px;">مسح السجل</button>
        <div id="orders-list"></div>
    </div>

    <div id="ticker-tab" class="content-section">
        <div class="card">
            <h3>📢 شريط الإهداءات</h3>
            <input type="text" id="ticker-text-input" style="width:100%; margin:10px 0;">
            <input type="number" id="ticker-speed-input" placeholder="السرعة">
            <button class="btn btn-save" style="width:100%; margin-top:10px;" onclick="saveTicker()">تحديث</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDH4h6Dg1DM9xGLc8x7mUaqnVICBf6HnNk",
        authDomain: "al-musaiba.firebaseapp.com",
        databaseURL: "https://al-musaiba-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "al-musaiba",
        storageBucket: "al-musaiba.firebasestorage.app",
        messagingSenderId: "693047037412",
        appId: "1:693047037412:web:9d3f3ab7831ac35cd80bf1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkAdmin() {
        if(document.getElementById('adminPass').value === '0598787757') {
            document.getElementById('admin-login').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadData();
        } else alert("غلط!");
    }

    function showTab(id, btn) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function loadData() {
        // تحميل الأسعار
        db.ref('settings/prices').once('value').then(snap => {
            const p = snap.val() || {};
            document.getElementById('p_tt_f').value = p.tt_f || 5;
            document.getElementById('p_tt_v').value = p.tt_v || 1;
            document.getElementById('p_tt_l').value = p.tt_l || 0.5;
            document.getElementById('p_ig_f').value = p.ig_f || 3;
            document.getElementById('p_fb_f').value = p.fb_f || 4;
            document.getElementById('p_yt_s').value = p.yt_s || 15;
        });

        // الرادار
        db.ref('users').on('value', snap => {
            let html = "";
            const users = snap.val();
            for(let u in users) {
                html += `<div class="card"><div class="flex-row"><span>👤 ${u}</span><span>💰 <input type="number" id="bal_${u}" value="${users[u].balance}" style="width:70px"></span><button class="btn btn-save" onclick="saveBal('${u}')">حفظ</button></div></div>`;
            }
            document.getElementById('users-list').innerHTML = html;
        });

        // الطلبات مع (ملغي)
        db.ref('orders').on('value', snap => {
            const orders = snap.val();
            if(!orders) return;
            let html = Object.values(orders).reverse().map(o => `
                <div class="card">
                    <b>${o.service}</b> - ${o.user}<br>
                    <select id="st_${o.orderId}" style="width:100%; margin-top:10px;">
                        <option value="قيد التنفيذ" ${o.status==='قيد التنفيذ'?'selected':''}>⏳ قيد التنفيذ</option>
                        <option value="مكتمل" ${o.status==='مكتمل'?'selected':''}>✅ مكتمل</option>
                        <option value="ملغي" ${o.status==='ملغي'?'selected':''}>❌ ملغي</option>
                    </select>
                    <button class="btn btn-save" style="width:100%; margin-top:5px;" onclick="updOrd('${o.user}','${o.orderId}')">تحديث الحالة</button>
                </div>`).join('');
            document.getElementById('orders-list').innerHTML = html;
        });
    }

    function saveAllPrices() {
        const data = {
            tt_f: document.getElementById('p_tt_f').value,
            tt_v: document.getElementById('p_tt_v').value,
            tt_l: document.getElementById('p_tt_l').value,
            ig_f: document.getElementById('p_ig_f').value,
            fb_f: document.getElementById('p_fb_f').value,
            yt_s: document.getElementById('p_yt_s').value
        };
        db.ref('settings/prices').set(data).then(() => alert("تم حفظ الأسعار الـ 6 بنجاح!"));
    }

    function saveBal(u) { db.ref('users/'+u).update({balance: parseFloat(document.getElementById('bal_'+u).value)}); alert("تم"); }
    function updOrd(u, id) { 
        const s = document.getElementById('st_'+id).value;
        db.ref('orders/'+id).update({status:s});
        db.ref('user_orders/'+u+'/'+id).update({status:s});
        alert("تم تحديث الحالة");
    }
    function saveTicker() {
        db.ref('settings/ticker').set({text: document.getElementById('ticker-text-input').value, speed: document.getElementById('ticker-speed-input').value});
        alert("تم");
    }
    function clearOrders() { if(confirm("أكيد؟")) { db.ref('orders').remove(); db.ref('user_orders').remove(); } }
</script>
</body>
</html>
