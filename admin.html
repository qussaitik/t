<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة | عالم المصيبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --primary: #6c5ce7; 
            --secondary: #00cec9; 
            --bg: #0a0a0c; 
            --card-bg: rgba(255, 255, 255, 0.04);
            --danger: #ff7675; 
            --success: #55efc4; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Tajawal', sans-serif; background: radial-gradient(circle at center, #1e1e2f 0%, #0a0a0c 100%); color: white; min-height: 100vh; padding: 15px; }

        /* شاشة تسجيل الدخول */
        #admin-login {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999; display: flex;
            align-items: center; justify-content: center; flex-direction: column;
            backdrop-filter: blur(20px);
        }
        .login-box {
            background: var(--card-bg); padding: 40px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 90%; max-width: 380px;
        }
        input[type="password"] { 
            padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); 
            width: 100%; text-align: center; margin-bottom: 20px; font-size: 18px; 
            background: rgba(255,255,255,0.05); color: white; outline: none;
        }
        .btn-login { 
            width: 100%; padding: 12px; border-radius: 15px; border: none; 
            background: linear-gradient(45deg, var(--primary), var(--secondary)); 
            color: white; font-weight: 900; cursor: pointer; transition: 0.3s;
        }

        .container { max-width: 900px; margin: 20px auto; display: none; animation: fadeIn 0.6s ease; }
        h1 { text-align: center; margin-bottom: 25px; font-weight: 900; color: var(--secondary); text-shadow: 0 0 15px rgba(0,206,201,0.3); }

        .top-actions { display: flex; gap: 12px; margin-bottom: 25px; }
        .btn-logout { padding: 15px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; color: white; cursor: pointer; font-weight: bold; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; background: var(--card-bg); padding: 8px; border-radius: 22px; border: 1px solid rgba(255,255,255,0.05); }
        .tab-btn { flex: 1; padding: 14px; border: none; border-radius: 15px; background: transparent; cursor: pointer; font-weight: 900; color: #aaa; transition: 0.4s; font-family: 'Tajawal'; }
        .tab-btn.active { background: var(--primary); color: white; }

        .content-section { display: none; }
        .content-section.active { display: block; }

        .card { 
            background: var(--card-bg); padding: 25px; border-radius: 28px; 
            margin-bottom: 18px; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(10px);
        }

        .flex-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        
        input, select { 
            padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); 
            font-family: 'Tajawal'; background: #1a1a1c; color: white; outline: none;
        }

        .btn-action { border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 900; }
        .btn-save { background: var(--success); color: #000; }
        .btn-del { background: rgba(255, 118, 117, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .user-info b { font-size: 18px; color: var(--secondary); }
        .order-detail { font-size: 14px; color: #ccc; line-height: 1.8; margin: 10px 0; }
        .order-link { color: var(--primary); text-decoration: none; font-size: 13px; word-break: break-all; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="admin-login">
        <div class="login-box">
            <i class="fas fa-user-shield" style="font-size: 50px; color: var(--primary); margin-bottom: 20px;"></i>
            <h2 style="margin-bottom: 20px; font-weight: 900;">دخول الإدارة</h2>
            <input type="password" id="adminPass" placeholder="كلمة المرور">
            <button class="btn-login" onclick="checkAdmin()">دخول النظام</button>
        </div>
    </div>

    <div class="container" id="main-content">
        <h1>إدارة عالم المصيبة <i class="fas fa-tools"></i></h1>
        
        <div class="top-actions">
            <div style="flex:1"></div>
            <button class="btn-logout" onclick="adminLogout()">خروج</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('users-section', this)"><i class="fas fa-users"></i> المشتركين</button>
            <button class="tab-btn" onclick="showTab('orders-section', this)"><i class="fas fa-shopping-cart"></i> الطلبات</button>
        </div>

        <div id="users-section" class="content-section active">
            <div id="users-list"></div>
        </div>

        <div id="orders-section" class="content-section">
            <button onclick="clearAllOrders()" style="width: 100%; padding: 15px; background: rgba(255, 118, 117, 0.1); color: var(--danger); border: 1px solid var(--danger); border-radius: 15px; margin-bottom: 25px; cursor: pointer; font-weight: 900;">
                <i class="fas fa-trash-alt"></i> مسح السجل كامل
            </button>
            <div id="orders-list"></div>
        </div>
    </div>

    <script>
        // إعدادات الفايربيز (نفس اللي بستخدمها قصي دايماً)
        const firebaseConfig = {
            apiKey: "AIzaSyDH4h6Dg1DM9xGLc8x7mUaqnVICBf6HnNk",
            authDomain: "al-musaiba.firebaseapp.com",
            databaseURL: "https://al-musaiba-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "al-musaiba",
            storageBucket: "al-musaiba.firebasestorage.app",
            messagingSenderId: "693047037412",
            appId: "1:693047037412:web:9d3f3ab7831ac35cd80bf1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // فحص الدخول
        function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            if (pass === '0598787757') {
                sessionStorage.setItem('isAdmin', 'true');
                document.getElementById('admin-login').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                initRealtimeData();
            } else { alert("كلمة المرور غلط يا مدير!"); }
        }

        function adminLogout() {
            sessionStorage.removeItem('isAdmin');
            location.reload();
        }

        function showTab(id, btn) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // جلب البيانات Realtime
        function initRealtimeData() {
            // جلب المستخدمين
            db.ref('users').on('value', (snapshot) => {
                const users = snapshot.val();
                let html = "";
                for(let u in users) {
                    html += `
                    <div class="card">
                        <div class="flex-row">
                            <div class="user-info"><b>👤 ${u}</b></div>
                            <span style="color:${users[u].status === 'محظور' ? 'var(--danger)' : 'var(--success)'}">${users[u].status || 'نشط'}</span>
                        </div>
                        <div class="flex-row" style="margin-top:20px;">
                            <span>💰 رصيد: <input type="number" step="0.01" value="${users[u].balance}" id="bal_${u}" style="width:90px"></span>
                            <div style="display:flex; gap:8px;">
                                <button class="btn-action btn-save" onclick="saveUser('${u}')">حفظ</button>
                                <button class="btn-action btn-del" onclick="deleteUser('${u}')">حذف</button>
                            </div>
                        </div>
                    </div>`;
                }
                document.getElementById('users-list').innerHTML = html || '<p style="text-align:center">لا يوجد مشتركين</p>';
            });

            // جلب الطلبات
            db.ref('orders').on('value', (snapshot) => {
                const orders = snapshot.val();
                if(!orders) {
                    document.getElementById('orders-list').innerHTML = '<p style="text-align:center">لا يوجد طلبات</p>';
                    return;
                }
                const ordersArr = Object.values(orders).reverse();
                let html = ordersArr.map(o => `
                    <div class="card">
                        <div class="flex-row">
                            <b style="color:var(--secondary)">${o.service}</b>
                            <small style="color:#888">${o.date}</small>
                        </div>
                        <div class="order-detail">
                            المستخدم: <b>${o.user}</b> | الكمية: <b>${o.qty}</b><br>
                            الرابط: <a href="${o.link}" target="_blank" class="order-link">${o.link}</a>
                        </div>
                        <div class="flex-row">
                            <select id="st_${o.orderId}">
                                <option value="قيد التنفيذ" ${o.status === 'قيد التنفيذ' ? 'selected' : ''}>⏳ قيد التنفيذ</option>
                                <option value="مكتمل" ${o.status === 'مكتمل' ? 'selected' : ''}>✅ مكتمل</option>
                                <option value="ملغي" ${o.status === 'ملغي' ? 'selected' : ''}>❌ ملغي</option>
                            </select>
                            <button class="btn-action btn-save" onclick="updateOrderStatus('${o.user}', '${o.orderId}')">تحديث</button>
                        </div>
                    </div>
                `).join('');
                document.getElementById('orders-list').innerHTML = html;
            });
        }

        function saveUser(username) {
            const newBal = parseFloat(document.getElementById('bal_'+username).value);
            db.ref('users/' + username).update({ balance: newBal })
              .then(() => alert("تم تحديث رصيد " + username));
        }

        function deleteUser(username) {
            if(confirm("تحذف " + username + "؟")) {
                db.ref('users/' + username).remove();
            }
        }

        function updateOrderStatus(user, orderId) {
            const status = document.getElementById('st_' + orderId).value;
            const updates = {};
            updates['/orders/' + orderId + '/status'] = status;
            updates['/user_orders/' + user + '/' + orderId + '/status'] = status;
            db.ref().update(updates).then(() => alert("تم التحديث"));
        }

        function clearAllOrders() {
            if(confirm("بدك تمسح كل الطلبات؟")) {
                db.ref('orders').remove();
                db.ref('user_orders').remove();
            }
        }
    </script>
</body>
</html>
