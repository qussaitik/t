<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلباتي | عالم المصيبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --primary: #6c5ce7; 
            --secondary: #a29bfe;
            --bg: #f8f9fd; 
            --white: #ffffff;
            --success: #00b894; 
            --danger: #ff7675; 
            --warning: #fdcb6e; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--bg);
            min-height: 100vh;
            color: #2d3436; 
            padding: 25px 15px;
        }

        .container { max-width: 600px; margin: auto; animation: fadeIn 0.8s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header { 
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding: 0 10px;
        }
        
        .header h1 { font-weight: 900; font-size: 24px; color: var(--primary); }
        
        .back-btn {
            background: var(--white); border: 1px solid rgba(108, 92, 231, 0.1);
            color: var(--primary); padding: 10px 18px; border-radius: 15px; 
            text-decoration: none; font-size: 14px; font-weight: 700; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.05);
        }
        .back-btn:hover { background: var(--primary); color: white; transform: translateX(-5px); }

        .order-card { 
            background: var(--white); 
            padding: 22px; border-radius: 28px; 
            margin-bottom: 18px; border: 1px solid rgba(255, 255, 255, 0.8); 
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.05);
            transition: 0.4s; position: relative; overflow: hidden;
        }
        .order-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(108, 92, 231, 0.1); }

        .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .service-name { font-weight: 900; font-size: 17px; color: #2d3436; display: block; }
        .order-date { font-size: 11px; color: #b2bec3; font-weight: 400; margin-top: 4px; display: block; }

        .order-info { font-size: 14px; color: #636e72; margin-bottom: 5px; display: flex; gap: 20px; flex-wrap: wrap; }
        .info-item b { color: var(--primary); font-weight: 700; }

        .status-badge { 
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 14px; border-radius: 12px; font-weight: 800; font-size: 12px; 
        }
        
        .st-pending { background: #fff9eb; color: var(--warning); border: 1px solid rgba(253, 203, 110, 0.2); }
        .st-completed { background: #e6fffb; color: var(--success); border: 1px solid rgba(0, 184, 148, 0.2); }
        .st-cancelled { background: #fff1f0; color: var(--danger); border: 1px solid rgba(255, 118, 117, 0.2); }

        .no-orders { 
            text-align: center; padding: 60px 20px; 
            background: var(--white);
            border-radius: 35px; border: 1px dashed rgba(108, 92, 231, 0.2);
            color: #b2bec3; font-weight: 700; 
        }
        
        .loader-spinner {
            border: 4px solid #f1f1f1; border-top: 4px solid var(--primary);
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
            margin: 50px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📦 سجل طلباتي</h1>
        <a href="services.html" class="back-btn">رجوع <i class="fas fa-chevron-left"></i></a>
    </div>

    <div id="orders-list">
        <div class="loader-spinner"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDH4h6Dg1DM9xGLc8x7mUaqnVICBf6HnNk",
        authDomain: "al-musaiba.firebaseapp.com",
        databaseURL: "https://al-musaiba-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "al-musaiba",
        storageBucket: "al-musaiba.firebasestorage.app",
        messagingSenderId: "693047037412",
        appId: "1:693047037412:web:9d3f3ab7831ac35cd80bf1"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const storedUser = localStorage.getItem('user');

    function loadOrders() {
        if (!storedUser) {
            document.getElementById('orders-list').innerHTML = '<div class="no-orders">⚠️ يرجى تسجيل الدخول أولاً</div>';
            return;
        }

        database.ref('user_orders/' + storedUser).on('value', (snapshot) => {
            const data = snapshot.val();
            const ordersList = document.getElementById('orders-list');
            
            if (!data) {
                ordersList.innerHTML = `<div class="no-orders"><i class="fas fa-box-open" style="font-size:40px; margin-bottom:15px; display:block; color: #eee;"></i>لا يوجد طلبات سابقة</div>`;
                return;
            }

            const ordersArray = Object.values(data).reverse();
            let html = "";

            ordersArray.forEach(o => {
                let stClass = "st-pending";
                let icon = "fa-clock";
                let status = o.status || "قيد التنفيذ";

                if (status === "مكتمل") { stClass = "st-completed"; icon = "fa-check-circle"; }
                else if (status === "ملغي" || status === "فشل") { stClass = "st-cancelled"; icon = "fa-times-circle"; }

                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <span class="service-name">${o.service}</span>
                                <span class="order-date"><i class="far fa-calendar-alt"></i> ${o.date}</span>
                            </div>
                            <div class="status-badge ${stClass}">
                                <i class="fas ${icon}"></i> ${status}
                            </div>
                        </div>
                        <div class="order-info">
                            <div class="info-item">الكمية: <b>${o.qty}</b></div>
                            <div class="info-item">التكلفة: <b>$${parseFloat(o.cost || 0).toFixed(3)}</b></div>
                        </div>
                    </div>`;
            });
            ordersList.innerHTML = html;
        }, (error) => {
            document.getElementById('orders-list').innerHTML = '<div class="no-orders">❌ حدث خطأ في تحميل البيانات</div>';
        });
    }

    loadOrders();
</script>
</body>
</html>
