<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلباتي | عالم المصيبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --primary: #6c5ce7; 
            --secondary: #00cec9;
            --bg: #0a0a0c; 
            --card-bg: rgba(255, 255, 255, 0.04);
            --success: #00b894; 
            --danger: #d63031; 
            --warning: #fdcb6e; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background: radial-gradient(circle at center, #1e1e2f 0%, #0a0a0c 100%);
            min-height: 100vh;
            color: white; 
            padding: 25px 15px;
        }

        .container { max-width: 600px; margin: auto; animation: fadeIn 0.8s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header { 
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding: 0 10px;
        }
        
        .header h1 { font-weight: 900; font-size: 24px; color: var(--secondary); text-shadow: 0 0 15px rgba(0,206,201,0.2); }
        
        .back-btn {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 10px 18px; border-radius: 15px; 
            text-decoration: none; font-size: 14px; font-weight: 700; transition: 0.3s;
        }
        .back-btn:hover { background: var(--primary); transform: translateX(-5px); }

        .order-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(20px);
            padding: 22px; border-radius: 28px; 
            margin-bottom: 18px; border: 1px solid rgba(255,255,255,0.08); 
            transition: 0.4s; position: relative; overflow: hidden;
        }
        .order-card:hover { transform: scale(1.02); border-color: var(--primary); }

        .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .service-name { font-weight: 900; font-size: 17px; color: white; display: block; }
        .order-date { font-size: 11px; color: #aaa; font-weight: 400; margin-top: 4px; display: block; }

        .order-info { font-size: 14px; color: #ccc; margin-bottom: 15px; display: flex; gap: 15px; flex-wrap: wrap; }
        .info-item b { color: var(--secondary); }

        .status-badge { 
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 12px; font-weight: 800; font-size: 12px; 
        }
        
        .st-pending { background: rgba(253, 203, 110, 0.1); color: var(--warning); border: 1px solid rgba(253, 203, 110, 0.2); }
        .st-completed { background: rgba(0, 184, 148, 0.1); color: var(--success); border: 1px solid rgba(0, 184, 148, 0.2); }
        .st-cancelled { background: rgba(214, 48, 49, 0.1); color: var(--danger); border: 1px solid rgba(214, 48, 49, 0.2); }

        .no-orders { 
            text-align: center; padding: 60px 20px; 
            background: var(--card-bg); backdrop-filter: blur(15px);
            border-radius: 35px; border: 1px dashed rgba(255,255,255,0.1);
            color: #aaa; font-weight: 700; 
        }
        
        .loader-spinner {
            border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--secondary);
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
            margin: 50px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📦 سجل طلباتي</h1>
        <a href="services.html" class="back-btn"><i class="fas fa-chevron-right"></i> رجوع</a>
    </div>

    <div id="orders-list">
        <div class="loader-spinner"></div>
    </div>
</div>

<script>
    // إعدادات الفايربيز
    const firebaseConfig = {
        apiKey: "AIzaSyDH4h6Dg1DM9xGLc8x7mUaqnVICBf6HnNk",
        authDomain: "al-musaiba.firebaseapp.com",
        databaseURL: "https://al-musaiba-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "al-musaiba",
        storageBucket: "al-musaiba.firebasestorage.app",
        messagingSenderId: "693047037412",
        appId: "1:693047037412:web:9d3f3ab7831ac35cd80bf1"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const storedUser = localStorage.getItem('user');

    function loadOrders() {
        if (!storedUser) {
            document.getElementById('orders-list').innerHTML = '<div class="no-orders">⚠️ يرجى تسجيل الدخول أولاً</div>';
            return;
        }

        // الاستماع للطلبات الخاصة بالمستخدم فقط (Realtime)
        database.ref('user_orders/' + storedUser).on('value', (snapshot) => {
            const data = snapshot.val();
            const ordersList = document.getElementById('orders-list');
            
            if (!data) {
                ordersList.innerHTML = `<div class="no-orders"><i class="fas fa-ghost" style="font-size:40px; margin-bottom:15px; display:block;"></i>لا يوجد طلبات سابقة</div>`;
                return;
            }

            // تحويل الكائن إلى مصفوفة وترتيبها من الأحدث للأقدم
            const ordersArray = Object.values(data).reverse();
            let html = "";

            ordersArray.forEach(o => {
                let stClass = "st-pending";
                let icon = "fa-clock";
                let status = o.status || "قيد التنفيذ";

                if (status === "مكتمل") { stClass = "st-completed"; icon = "fa-check-circle"; }
                else if (status === "ملغي") { stClass = "st-cancelled"; icon = "fa-times-circle"; }

                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <span class="service-name">${o.service}</span>
                                <span class="order-date">${o.date}</span>
                            </div>
                            <div class="status-badge ${stClass}">
                                <i class="fas ${icon}"></i> ${status}
                            </div>
                        </div>
                        <div class="order-info">
                            <div class="info-item">الكمية: <b>${o.qty}</b></div>
                            <div class="info-item">التكلفة: <b>$${parseFloat(o.cost).toFixed(3)}</b></div>
                        </div>
                    </div>`;
            });
            ordersList.innerHTML = html;
        }, (error) => {
            document.getElementById('orders-list').innerHTML = '<div class="no-orders">❌ حدث خطأ في تحميل البيانات</div>';
        });
    }

    // تشغيل الدالة
    loadOrders();
</script>
</body>
</html>
