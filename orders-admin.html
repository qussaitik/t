<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلبات | عالم المصيبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --primary: #6c5ce7; 
            --secondary: #00cec9; 
            --bg: #0a0a0c; 
            --card-bg: rgba(255, 255, 255, 0.04);
            --danger: #ff7675; 
            --success: #55efc4; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: radial-gradient(circle at center, #1e1e2f 0%, #0a0a0c 100%); 
            color: white; min-height: 100vh; padding: 15px; 
        }

        /* شاشة الدخول السرية */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 10000;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            backdrop-filter: blur(20px);
        }
        .auth-box {
            background: var(--card-bg); padding: 40px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 90%; max-width: 350px;
        }
        .auth-box input {
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: white; text-align: center; font-size: 20px; margin-bottom: 20px; outline: none;
        }
        .auth-box button {
            width: 100%; padding: 12px; border-radius: 15px; border: none;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; font-weight: 900; cursor: pointer;
        }

        /* محتوى الصفحة الرئيسي */
        #main-content { display: none; max-width: 800px; margin: 20px auto; animation: fadeIn 0.6s ease; }
        
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-weight: 900; font-size: 28px; color: var(--secondary); }

        .btn-refresh { 
            width: 100%; padding: 15px; background: rgba(0, 206, 201, 0.1); border: 1px solid var(--secondary); 
            border-radius: 18px; color: var(--secondary); font-weight: 900; cursor: pointer; margin-bottom: 25px;
        }

        .order-card { 
            background: var(--card-bg); padding: 25px; border-radius: 28px; 
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(15px);
        }

        .flex-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .order-body { margin: 15px 0; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 15px; font-size: 14px; color: #ccc; }
        .order-link { color: var(--primary); text-decoration: none; word-break: break-all; }

        select { 
            padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(255,255,255,0.05); color: white; outline: none; width: 150px;
        }
        .btn-update { border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: 900; background: var(--success); color: #000; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <i class="fas fa-lock" style="font-size: 40px; color: var(--primary); margin-bottom: 20px;"></i>
        <h2 style="margin-bottom: 20px;">دخول المشرف</h2>
        <input type="password" id="passInput" placeholder="أدخل رمز الدخول">
        <button onclick="verifyPass()">دخول</button>
    </div>
</div>

<div class="container" id="main-content">
    <header>
        <h1>📦 إدارة الطلبات</h1>
    </header>

    <button class="btn-refresh" onclick="loadOrders()">
        <i class="fas fa-sync-alt"></i> تحديث القائمة
    </button>

    <div id="orders-list"></div>
</div>

<script>
    // إعدادات الفايربيز الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyDH4h6Dg1DM9xGLc8x7mUaqnVICBf6HnNk",
        authDomain: "al-musaiba.firebaseapp.com",
        databaseURL: "https://al-musaiba-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "al-musaiba",
        storageBucket: "al-musaiba.firebasestorage.app",
        messagingSenderId: "693047037412",
        appId: "1:693047037412:web:9d3f3ab7831ac35cd80bf1"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // دالة فحص الباسوورد (الأصلي)
    function verifyPass() {
        const pass = document.getElementById('passInput').value;
        if (pass === '998877') {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadOrders();
        } else {
            alert("الرمز خطأ يا غالي!");
        }
    }

    // جلب الطلبات من الفايربيز
    function loadOrders() {
        const list = document.getElementById('orders-list');
        list.innerHTML = '<p style="text-align:center;">جاري جلب الطلبات...</p>';

        database.ref('orders').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                list.innerHTML = '<p style="text-align:center;">لا يوجد طلبات حالياً</p>';
                return;
            }

            const ordersArray = Object.values(data).reverse();
            let html = "";
            ordersArray.forEach((o) => {
                html += `
                    <div class="order-card">
                        <div class="flex-row">
                            <b style="font-size:18px; color:var(--secondary);">${o.service}</b>
                            <small style="color:#777;">${o.date}</small>
                        </div>
                        <div class="order-body">
                            المستخدم: <b>${o.user}</b> <br>
                            الكمية: <b>${o.qty}</b> <br>
                            الرابط: <a href="${o.link}" target="_blank" class="order-link">${o.link}</a>
                        </div>
                        <div class="flex-row">
                            <select id="status_${o.orderId}">
                                <option value="قيد التنفيذ" ${o.status === 'قيد التنفيذ' ? 'selected' : ''}>⏳ قيد التنفيذ</option>
                                <option value="مكتمل" ${o.status === 'مكتمل' ? 'selected' : ''}>✅ مكتمل</option>
                                <option value="ملغي" ${o.status === 'ملغي' ? 'selected' : ''}>❌ ملغي</option>
                            </select>
                            <button class="btn-update" onclick="updateStatus('${o.user}','${o.orderId}')">حفظ</button>
                        </div>
                    </div>`;
            });
            list.innerHTML = html;
        });
    }

    // تحديث الحالة في الفايربيز (للمشرف وللمستخدم)
    function updateStatus(user, orderId) {
        const status = document.getElementById('status_' + orderId).value;
        const updates = {};
        updates['/orders/' + orderId + '/status'] = status;
        updates['/user_orders/' + user + '/' + orderId + '/status'] = status;

        database.ref().update(updates).then(() => {
            alert("تم تحديث الحالة بنجاح ✅");
        }).catch(() => {
            alert("حدث خطأ ❌");
        });
    }
</script>
</body>
</html>
