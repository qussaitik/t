<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلبات | عالم المصيبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --primary: #6c5ce7; 
            --secondary: #00b894; 
            --bg: #f8f9fd; 
            --white: #ffffff;
            --danger: #ff7675; 
            --text: #2d3436;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            min-height: 100vh; padding: 15px; 
        }

        /* شاشة الدخول السرية */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-box {
            background: var(--white); padding: 50px 40px; border-radius: 40px;
            text-align: center; width: 90%; max-width: 380px;
            box-shadow: 0 25px 50px rgba(108, 92, 231, 0.1);
        }
        .auth-box i { font-size: 50px; color: var(--primary); margin-bottom: 20px; }
        .auth-box input {
            width: 100%; padding: 18px; border-radius: 20px; border: 2px solid #f1f1f1;
            background: #fafafa; color: var(--text); text-align: center; font-size: 20px; margin-bottom: 20px; outline: none;
            transition: 0.3s;
        }
        .auth-box input:focus { border-color: var(--primary); background: var(--white); }
        .auth-box button {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: linear-gradient(135deg, var(--primary), #a29bfe);
            color: white; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.2);
        }

        /* محتوى الصفحة الرئيسي */
        #main-content { display: none; max-width: 800px; margin: 20px auto; animation: fadeIn 0.6s ease; }
        
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-weight: 900; font-size: 28px; color: var(--primary); }

        .btn-refresh { 
            width: 100%; padding: 15px; background: var(--white); border: 1px solid rgba(108, 92, 231, 0.2); 
            border-radius: 18px; color: var(--primary); font-weight: 900; cursor: pointer; margin-bottom: 25px;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }
        .btn-refresh:hover { background: var(--primary); color: white; }

        .order-card { 
            background: var(--white); padding: 25px; border-radius: 30px; 
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.05);
            transition: 0.3s;
        }
        .order-card:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(108, 92, 231, 0.1); }

        .flex-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        
        .order-body { 
            margin: 15px 0; padding: 15px; background: #f9f9fc; border-radius: 15px; 
            font-size: 14px; color: #636e72; border-right: 4px solid var(--primary);
        }
        .order-link { color: var(--primary); text-decoration: none; word-break: break-all; font-weight: 700; }

        select { 
            padding: 12px; border-radius: 12px; border: 2px solid #f1f1f1; 
            background: #fafafa; color: var(--text); outline: none; width: 160px;
            font-family: 'Tajawal'; font-weight: 600;
        }
        .btn-update { 
            border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; 
            font-weight: 900; background: var(--secondary); color: white;
            box-shadow: 0 5px 15px rgba(0, 184, 148, 0.2);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <i class="fas fa-user-lock"></i>
        <h2 style="margin-bottom: 25px;">دخول المشرف</h2>
        <input type="password" id="passInput" placeholder="أدخل رمز الدخول">
        <button onclick="verifyPass()">دخول النظام</button>
    </div>
</div>

<div class="container" id="main-content">
    <header>
        <h1>📦 إدارة الطلبات</h1>
    </header>

    <button class="btn-refresh" onclick="loadOrders()">
        <i class="fas fa-sync-alt"></i> تحديث القائمة
    </button>

    <div id="orders-list"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDH4h6Dg1DM9xGLc8x7mUaqnVICBf6HnNk",
        authDomain: "al-musaiba.firebaseapp.com",
        databaseURL: "https://al-musaiba-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "al-musaiba",
        storageBucket: "al-musaiba.firebasestorage.app",
        messagingSenderId: "693047037412",
        appId: "1:693047037412:web:9d3f3ab7831ac35cd80bf1"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function verifyPass() {
        const pass = document.getElementById('passInput').value;
        if (pass === '998877') {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadOrders();
        } else {
            alert("الرمز خطأ يا غالي!");
        }
    }

    function loadOrders() {
        const list = document.getElementById('orders-list');
        list.innerHTML = '<p style="text-align:center; padding:20px; color:#7f8c8d;">جاري جلب الطلبات...</p>';

        database.ref('orders').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                list.innerHTML = '<div style="text-align:center; padding:40px; color:#b2bec3;">لا يوجد طلبات حالياً</div>';
                return;
            }

            const ordersArray = Object.values(data).reverse();
            let html = "";
            ordersArray.forEach((o) => {
                html += `
                    <div class="order-card">
                        <div class="flex-row">
                            <b style="font-size:18px; color:var(--primary);">${o.service}</b>
                            <small style="color:#b2bec3;"><i class="far fa-clock"></i> ${o.date}</small>
                        </div>
                        <div class="order-body">
                            <strong>المستخدم:</strong> ${o.user} <br>
                            <strong>الكمية:</strong> ${o.qty} <br>
                            <strong>الرابط:</strong> <a href="${o.link}" target="_blank" class="order-link">فتح الرابط <i class="fas fa-external-link-alt"></i></a>
                        </div>
                        <div class="flex-row">
                            <select id="status_${o.orderId}">
                                <option value="قيد التنفيذ" ${o.status === 'قيد التنفيذ' ? 'selected' : ''}>⏳ قيد التنفيذ</option>
                                <option value="مكتمل" ${o.status === 'مكتمل' ? 'selected' : ''}>✅ مكتمل</option>
                                <option value="ملغي" ${o.status === 'ملغي' ? 'selected' : ''}>❌ ملغي</option>
                            </select>
                            <button class="btn-update" onclick="updateStatus('${o.user}','${o.orderId}')">حفظ الحالة</button>
                        </div>
                    </div>`;
            });
            list.innerHTML = html;
        });
    }

    function updateStatus(user, orderId) {
        const status = document.getElementById('status_' + orderId).value;
        const updates = {};
        updates['/orders/' + orderId + '/status'] = status;
        updates['/user_orders/' + user + '/' + orderId + '/status'] = status;

        database.ref().update(updates).then(() => {
            alert("تم تحديث الحالة بنجاح ✅");
        }).catch(() => {
            alert("حدث خطأ ❌");
        });
    }
</script>
</body>
</html>
