<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم المصيبة | الواجهة المطورة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --main-purple: #6c5ce7;
            --soft-bg: #fdfdff;
            --heart-color: #ff7675;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--soft-bg);
            direction: rtl;
        }

        /* الهيدر المطور - الاسم عاليمين والقلوب معه */
        .top-header {
            background: #fff;
            padding: 25px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f1f1;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .user-right {
            display: flex;
            flex-direction: column;
            text-align: right;
        }

        .welcome-txt { font-size: 13px; color: #b2bec3; }
        
        .name-heart-area {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
        }

        .name-heart-area b {
            font-size: 24px;
            font-weight: 900;
            color: var(--main-purple);
        }

        .fa-heart {
            color: var(--heart-color);
            font-size: 16px;
            animation: beat 1.5s infinite;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .logout-left i {
            font-size: 24px;
            color: #dcdde1;
            cursor: pointer;
            transition: 0.3s;
        }
        .logout-left i:hover { color: var(--heart-color); }

        /* الأزرار العلوية */
        .nav-grid {
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            gap: 12px;
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }

        .nav-card {
            background: #fff;
            padding: 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.01);
            cursor: pointer;
        }

        /* زر الرصيد الأنيق */
        .balance-card {
            background: linear-gradient(135deg, #6c5ce7, #8e44ad);
            color: white;
            flex-direction: column;
            border: none;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.25);
        }
        .balance-card small { font-size: 11px; opacity: 0.85; }
        .balance-card span { font-size: 18px; font-weight: 900; }

        .nav-card span { font-weight: 700; font-size: 14px; color: #2d3436; }
        .balance-card span { color: white; }

        /* شبكة الخدمات - 2 بكل سطر */
        .services-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 10px 20px 40px;
            max-width: 900px;
            margin: auto;
        }

        .service-box {
            background: white;
            padding: 25px 10px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            border: 1px solid #f1f1f1;
            transition: 0.3s;
        }
        .service-box:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(108, 92, 231, 0.08); }

        .icon-circle {
            width: 60px; height: 60px; border-radius: 20px;
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: white;
        }

        .service-box h3 { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
        .price-badge {
            background: rgba(108, 92, 231, 0.06); color: var(--main-purple);
            padding: 4px 12px; border-radius: 50px; font-size: 10px; font-weight: 900;
        }

        /* الألوان */
        .bg-black { background: #000; }
        .bg-insta { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }
        .bg-blue { background: #1877f2; }
        .bg-red { background: #ff0000; }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="user-right">
            <span class="welcome-txt">مرحباً بك،</span>
            <div class="name-heart-area">
                <i class="fas fa-heart"></i>
                <b id="user-name">...</b>
                <i class="fas fa-heart"></i>
            </div>
        </div>
        <div class="logout-left">
            <i class="fas fa-power-off" onclick="logout()"></i>
        </div>
    </header>

    <div class="nav-grid">
        <div class="nav-card balance-card">
            <small>رصيدك الحالي</small>
            <span id="user-balance">$0.0000</span>
        </div>
        <div class="nav-card" onclick="sendReq('شحن رصيد')">
            <i class="fas fa-plus-circle" style="color: #00b894;"></i>
            <span>شحن رصيد</span>
        </div>
        <div class="nav-card" onclick="window.location.href='my-orders.html'">
            <i class="fas fa-receipt" style="color: var(--main-purple);"></i>
            <span>سجل الطلبات</span>
        </div>
        <div class="nav-card" onclick="sendReq('دعم فني')">
            <i class="fas fa-headset" style="color: var(--heart-color);"></i>
            <span>دعم فني</span>
        </div>
    </div>

    <div class="services-section">
        <div class="service-box" onclick="openS('متابعين تيك توك')">
            <div class="icon-circle bg-black"><i class="fab fa-tiktok"></i></div>
            <h3>متابعين تيك توك</h3>
            <span class="price-badge">1000 متابع بـ 5$</span>
        </div>
        <div class="service-box" onclick="openS('مشاهدات تيك توك')">
            <div class="icon-circle bg-black"><i class="fas fa-eye"></i></div>
            <h3>مشاهدات تيك توك</h3>
            <span class="price-badge">10,000 مشاهدة بـ 1$</span>
        </div>
        <div class="service-box" onclick="openS('متابعين إنستغرام')">
            <div class="icon-circle bg-insta"><i class="fab fa-instagram"></i></div>
            <h3>متابعين إنستغرام</h3>
            <span class="price-badge">1000 متابع بـ 3$</span>
        </div>
        <div class="service-box" onclick="openS('متابعين فيسبوك')">
            <div class="icon-circle bg-blue"><i class="fab fa-facebook-f"></i></div>
            <h3>متابعين فيسبوك</h3>
            <span class="price-badge">1000 متابع بـ 4$</span>
        </div>
        <div class="service-box" onclick="openS('مشتركين يوتيوب')">
            <div class="icon-circle bg-red"><i class="fab fa-youtube"></i></div>
            <h3>مشتركين يوتيوب</h3>
            <span class="price-badge">1000 مشترك بـ 15$</span>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDH4h6Dg1DM9xGLc8x7mUaqnVICBf6HnNk",
            authDomain: "al-musaiba.firebaseapp.com",
            databaseURL: "https://al-musaiba-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "al-musaiba",
            storageBucket: "al-musaiba.firebasestorage.app",
            messagingSenderId: "693047037412",
            appId: "1:693047037412:web:9d3f3ab7831ac35cd80bf1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = localStorage.getItem('user');

        if(!user) window.location.href = "index.html";

        window.onload = () => {
            document.getElementById('user-name').innerText = user;
            db.ref('users/' + user + '/balance').on('value', (s) => {
                document.getElementById('user-balance').innerText = "$" + parseFloat(s.val() || 0).toFixed(4);
            });
        };

        function sendReq(type) {
            const id = "REQ-" + Date.now();
            const data = {
                orderId: id, user: user, service: "طلب " + type,
                status: "⏳ قيد المراجعة", date: new Date().toLocaleString('ar-EG'),
                price: "0", qty: "---", link: "نظام داخلي"
            };
            db.ref('orders/' + id).set(data);
            db.ref('user_orders/' + user + '/' + id).set(data);
            alert("تم إرسال طلب " + type + " بنجاح.");
        }

        function openS(s) { localStorage.setItem('chosenService', s); window.location.href = "order.html"; }
        function logout() { localStorage.removeItem('user'); window.location.href = "index.html"; }
    </script>
</body>
</html>
