<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عالم المصيبة PRO | Al-Musaiba World</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #0e0e12;
            --fire-core: #ff3e00;
            --fire-glow: #ff8c00;
            --gold-light: #ffd700;
            --gold-dark: #ccac00;
            --card-bg: rgba(0, 0, 0, 0.6);
            --text-main: #fff;
            --text-mute: #aaa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at center, #2c1a1a 0%, var(--bg-deep) 100%);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
            /* لضمان التوسيط الكامل */
            position: fixed;
            top: 0;
            left: 0;
        }

        /* كرت تسجيل الدخول - تم تعديل العرض والPadding للسنترة */
        .auth-card {
            background: var(--card-bg); 
            backdrop-filter: blur(35px);
            padding: 40px 25px; /* قللت البادنج الجانبي */
            border-radius: 30px; 
            width: 90%; /* عرض مرن */
            max-width: 380px; 
            text-align: center; 
            border: 1px solid rgba(255, 215, 0, 0.1); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            animation: fadeInUp 0.5s forwards;
            /* منع الإزاحة */
            margin: auto;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { 
            font-weight: 900; font-size: 28px; margin-bottom: 30px; 
            background: linear-gradient(135deg, var(--gold-light), #fff, var(--fire-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group { margin-bottom: 15px; width: 100%; }
        
        input {
            width: 100%; /* العرض كامل داخل الكرت */
            padding: 16px; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.05); 
            color: #fff; 
            text-align: center;
            font-family: 'Tajawal'; 
            font-size: 16px;
        }

        button {
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            border: none;
            background: linear-gradient(45deg, var(--fire-core), var(--fire-glow), var(--gold-dark));
            background-size: 200% 200%;
            color: #000; 
            font-weight: 900; 
            font-size: 18px; 
            cursor: pointer;
            margin-top: 10px;
            animation: gradientMove 3s ease infinite;
        }

        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .logo-icon { font-size: 50px; margin-bottom: 15px; display: inline-block; }

        /* لودر العمليات */
        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.98); z-index: 9999; flex-direction: column;
            justify-content: center; align-items: center; backdrop-filter: blur(25px);
        }
    </style>
</head>
<body>

    <div id="loader">
        <div style="text-align: center; background: rgba(255,255,255,0.02); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05);">
            <h3 style="color: var(--gold-light); margin-bottom: 10px;">قُصي وورده ❤️</h3>
            <p style="font-size: 13px; color: #ccc;">جاري معالجة البيانات...</p>
        </div>
    </div>

    <div class="auth-card" id="login-box">
        <div class="logo-icon">🔑</div>
        <h2>عالم المصيبة</h2>
        <div class="input-group">
            <input type="text" id="user" placeholder="اسم المستخدم" autocomplete="off">
        </div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="كلمة المرور">
        </div>
        <button onclick="executeLogin()">دخول آمن 🛡️</button>
        <div style="margin-top: 25px; font-size: 14px; color: #aaa;">ليس لديك حساب؟ <b style="color: var(--gold-light); cursor: pointer;" onclick="toggle(true)">أنشئ حساباً</b></div>
    </div>

    <div class="auth-card" id="reg-box" style="display:none;">
        <div class="logo-icon">✨</div>
        <h2>انضم إلينا</h2>
        <div class="input-group">
            <input type="text" id="reg-user" placeholder="اسم المستخدم الجديد">
        </div>
        <div class="input-group">
            <input type="email" id="reg-email" placeholder="البريد الإلكتروني">
        </div>
        <div class="input-group">
            <input type="password" id="reg-pass" placeholder="اختر كلمة مرور">
        </div>
        <button onclick="executeRegister()">تأكيد التسجيل</button>
        <div style="margin-top: 25px; font-size: 14px; color: #aaa;">لديك حساب؟ <b style="color: var(--gold-light); cursor: pointer;" onclick="toggle(false)">سجل دخولك</b></div>
    </div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbzUEWbeyHTdG2Eu96NZxxJJHWToeLsuOh6VuF-fiTeEpK9JP1mceRVra6HFP2EoiPdo/exec";
        function toggle(isReg) {
            document.getElementById('login-box').style.display = isReg ? 'none' : 'block';
            document.getElementById('reg-box').style.display = isReg ? 'block' : 'none';
        }
        async function executeLogin() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            if(!u || !p) return alert("يا غالي عبي البيانات!");
            document.getElementById('loader').style.display = 'flex';
            try {
                const res = await fetch(url + "?action=getBalances");
                const data = await res.json();
                if(data[u] && String(data[u].password).trim() === String(p).trim()) {
                    if(data[u].status === "محظور") { alert("⚠️ حسابك محظور"); location.reload(); }
                    else { localStorage.setItem('user', u); window.location.href = "services.html"; }
                } else { alert("❌ خطأ في البيانات"); location.reload(); }
            } catch(e) { alert("⚠️ مشكلة شبكة"); location.reload(); }
        }
        async function executeRegister() {
            const u = document.getElementById('reg-user').value.trim();
            const e = document.getElementById('reg-email').value.trim();
            const p = document.getElementById('reg-pass').value.trim();
            if(!u || !e || !p) return alert("كمل البيانات!");
            document.getElementById('loader').style.display = 'flex';
            try {
                const res = await fetch(url, { method: "POST", body: JSON.stringify({ action: "registerUser", user: u, email: e, pass: p }) });
                const result = await res.text();
                if(result === "Success") { alert("✅ تم بنجاح"); location.reload(); }
                else { alert("❌ الاسم مستخدم"); document.getElementById('loader').style.display = 'none'; }
            } catch(err) { alert("⚠️ فشل التسجيل"); document.getElementById('loader').style.display = 'none'; }
        }
    </script>
</body>
</html>
