<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة عالم المصيبة | الماركت الأقوى</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --dark: #0f0c29;
            --white: #ffffff;
            --gold: #f1c40f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            color: white;
        }

        /* لودر المصيبة المطور */
        #custom-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 12, 41, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; backdrop-filter: blur(8px);
        }
        .loader-content { text-align: center; }
        .spinner {
            width: 60px; height: 60px;
            border: 6px solid rgba(255,255,255,0.1);
            border-top: 6px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        .success-icon { font-size: 60px; color: #00b894; display: none; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .main-logo {
            text-align: center; margin-bottom: 40px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        .main-logo h1 {
            font-size: 45px; font-weight: 900;
            background: linear-gradient(to bottom, #fff, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(108, 92, 231, 0.5);
        }

        .portal-container {
            display: flex; flex-direction: column; gap: 15px;
            width: 100%; max-width: 400px;
            animation: slideUp 0.8s ease-out;
        }

        .portal-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; border-radius: 25px;
            display: flex; align-items: center; gap: 20px;
            cursor: pointer; transition: 0.4s;
            backdrop-filter: blur(10px);
        }

        .portal-card:hover {
            background: rgba(108, 92, 231, 0.2);
            transform: scale(1.05);
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .icon-box {
            width: 60px; height: 60px; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: white;
        }

        .member-bg { background: linear-gradient(45deg, #6c5ce7, #a29bfe); }
        .admin-bg { background: linear-gradient(45deg, #00b894, #55efc4); }
        .boss-bg { background: linear-gradient(45deg, #f1c40f, #f39c12); box-shadow: 0 0 15px rgba(241, 196, 15, 0.4); }

        .card-text h3 { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
        .card-text p { font-size: 12px; opacity: 0.7; }

        .auth-card {
            background: var(--white); color: #333;
            padding: 40px 30px; border-radius: 35px; width: 100%;
            max-width: 400px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            display: none; position: relative;
        }

        .back-btn {
            position: absolute; top: 20px; right: 20px;
            color: var(--primary); cursor: pointer; font-size: 20px;
        }

        input {
            width: 100%; padding: 16px; border-radius: 18px;
            border: 2px solid #f1f1f1; background: #fafafa;
            color: #2d3436; text-align: center; margin-bottom: 12px;
            font-family: 'Tajawal'; font-size: 16px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); }

        .btn-main {
            width: 100%; padding: 16px; border-radius: 18px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-weight: 700; font-size: 18px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.2);
        }

        @keyframes glow { from { filter: drop-shadow(0 0 5px rgba(108,92,231,0.4)); } to { filter: drop-shadow(0 0 20px rgba(108,92,231,0.8)); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="custom-loader">
        <div class="loader-content">
            <div id="loader-spinner" class="spinner"></div>
            <div id="loader-check" class="success-icon"><i class="fas fa-check-circle"></i></div>
            <h3 id="loader-text" style="font-weight: 700;">جاري معالجة الطلب...</h3>
        </div>
    </div>

    <div id="portal-view">
        <div class="main-logo">
            <i class="fas fa-bolt" style="color: var(--gold); font-size: 40px; margin-bottom: 10px;"></i>
            <h1>لوحة المصيبه</h1>
            <p style="opacity: 0.6; font-size: 14px; letter-spacing: 2px;">🇵🇸QUSSAI PALESTINE🇵🇸</p>
        </div>

        <div class="portal-container">
            <div class="portal-card" onclick="openLogin()">
                <div class="icon-box member-bg"><i class="fas fa-users"></i></div>
                <div class="card-text">
                    <h3>دخول الأعضاء</h3>
                    <p>تسجيل دخول أو إنشاء حساب جديد</p>
                </div>
            </div>

            <div class="portal-card" onclick="window.location.href='orders-admin.html'">
                <div class="icon-box admin-bg"><i class="fas fa-tasks"></i></div>
                <div class="card-text">
                    <h3>دخول المشرفين</h3>
                    <p>خاص بمشرفي الخدمات والطلبات</p>
                </div>
            </div>

            <div class="portal-card" onclick="window.location.href='admin.html'">
                <div class="icon-box boss-bg"><i class="fas fa-crown"></i></div>
                <div class="card-text">
                    <h3>دخول الإداره</h3>
                    <p>الإدارة العليا والتحكم الكامل</p>
                </div>
            </div>
        </div>
        
        <p style="text-align: center; margin-top: 30px; font-size: 11px; opacity: 0.4;">جميع الحقوق محفوظة لصالح قصي الفلسطيني 2026</p>
    </div>

    <div class="auth-card" id="login-view">
        <i class="fas fa-arrow-left back-btn" onclick="goBack()"></i>
        <h2 style="color: var(--primary); font-weight: 900; margin-bottom: 20px;">تسجيل دخول</h2>
        <input type="text" id="user" placeholder="اسم المستخدم">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn-main" onclick="executeLogin()">دخول آمن 🛡️</button>
        <div style="margin-top: 20px; font-size: 13px;" id="toggle-text">
            ليس لديك حساب؟ <b style="color:var(--primary); cursor:pointer;" onclick="showReg()">أنشئ حساباً</b>
        </div>
    </div>

    <div class="auth-card" id="reg-view">
        <i class="fas fa-arrow-left back-btn" onclick="goBack()"></i>
        <h2 style="color: var(--primary); font-weight: 900; margin-bottom: 20px;">حساب جديد</h2>
        <input type="text" id="reg-user" placeholder="اسم المستخدم">
        <input type="email" id="reg-email" placeholder="البريد الإلكتروني">
        <input type="password" id="reg-pass" placeholder="كلمة المرور">
        <button class="btn-main" onclick="executeRegister()">تأكيد التسجيل</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDH4h6Dg1DM9xGLc8x7mUaqnVICBf6HnNk",
            authDomain: "al-musaiba.firebaseapp.com",
            databaseURL: "https://al-musaiba-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "al-musaiba",
            storageBucket: "al-musaiba.firebasestorage.app",
            messagingSenderId: "693047037412",
            appId: "1:693047037412:web:9d3f3ab7831ac35cd80bf1"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function openLogin() {
            document.getElementById('portal-view').style.display = 'none';
            document.getElementById('login-view').style.display = 'block';
        }
        function showReg() {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('reg-view').style.display = 'block';
        }
        function goBack() {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('reg-view').style.display = 'none';
            document.getElementById('portal-view').style.display = 'block';
        }

        function executeLogin() {
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value.trim();
            if(!u || !p) return alert("عبّي بياناتك يا غالي");
            
            document.getElementById('custom-loader').style.display = 'flex';

            database.ref('users/' + u).once('value').then((snap) => {
                const data = snap.val();
                if (data && data.password === p) {
                    if (data.status === "محظور") {
                        alert("⚠️ حسابك محظور!");
                        location.reload();
                    } else {
                        database.ref('login_logs').push({
                            user: u,
                            timestamp: firebase.database.ServerValue.TIMESTAMP
                        });
                        localStorage.setItem('user', u);
                        window.location.href = "services.html";
                    }
                } else {
                    document.getElementById('custom-loader').style.display = 'none';
                    alert("❌ الاسم أو السر غلط");
                }
            });
        }

        function executeRegister() {
            const u = document.getElementById('reg-user').value.trim().toLowerCase();
            const e = document.getElementById('reg-email').value.trim();
            const p = document.getElementById('reg-pass').value.trim();
            if(!u || !e || !p) return alert("كل الخانات مطلوبة");

            // تشغيل اللودر
            document.getElementById('custom-loader').style.display = 'flex';
            document.getElementById('loader-spinner').style.display = 'block';
            document.getElementById('loader-check').style.display = 'none';
            document.getElementById('loader-text').innerText = "جاري الحفظ...";

            database.ref('users/' + u).once('value').then((snap) => {
                if (snap.exists()) {
                    document.getElementById('custom-loader').style.display = 'none';
                    alert("❌ الاسم مستخدم من قبل");
                } else {
                    database.ref('users/' + u).set({
                        username: u, email: e, password: p, balance: 0,
                        status: "نشط", joinDate: new Date().toISOString()
                    }).then(() => {
                        // تحويل اللودر لعلامة نجاح
                        document.getElementById('loader-spinner').style.display = 'none';
                        document.getElementById('loader-check').style.display = 'block';
                        document.getElementById('loader-text').innerText = "تم التسجيل بنجاح ✅";
                        
                        // تحديث الصفحة بعد ثانية واحدة تلقائياً
                        setTimeout(() => {
                            location.reload();
                        }, 1500);
                    });
                }
            }).catch(() => {
                document.getElementById('custom-loader').style.display = 'none';
                alert("❌ فشل الاتصال");
            });
        }
    </script>
</body>
</html>
