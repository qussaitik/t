<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عالم المصيبة | Al-Musaiba World</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-deep: #0a0a0c;
            --fire-core: #ff3e00;
            --fire-glow: #ff8c00;
            --gold-light: #ffd700;
            --card-bg: rgba(20, 20, 25, 0.9);
            --w: #25d366; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at center, #1a0f0f 0%, var(--bg-deep) 100%);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* لودر العمليات */
        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.98); z-index: 9999; flex-direction: column;
            justify-content: center; align-items: center; backdrop-filter: blur(20px);
        }

        .dua-container {
            margin-top: 15px; text-align: center; background: rgba(255,255,255,0.05);
            padding: 20px 40px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
        }

        #whatsapp-loader-btn {
            display: inline-block; margin-top: 25px; background: var(--w); 
            color: white; padding: 12px 25px; border-radius: 50px; 
            text-decoration: none; font-weight: bold; font-size: 14px; 
            transition: 0.3s; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }

        .progress-container {
            width: 250px; height: 6px; background: rgba(255, 255, 255, 0.05);
            border-radius: 10px; overflow: hidden; margin-top: 20px;
        }

        .progress-bar {
            width: 100%; height: 100%; background: linear-gradient(90deg, var(--fire-core), var(--fire-glow));
            border-radius: 10px; animation: progressAnim 3s linear infinite;
        }

        @keyframes progressAnim { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .auth-card {
            background: var(--card-bg); 
            padding: 40px 30px; border-radius: 30px; width: 88%;
            max-width: 380px; text-align: center; 
            border: 1px solid rgba(255, 62, 0, 0.2); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: fadeInUp 0.5s forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { 
            font-weight: 900; font-size: 30px; margin-bottom: 35px; 
            background: linear-gradient(135deg, var(--gold-light), #fff, var(--fire-glow));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        input {
            width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: white; text-align: center;
            font-family: 'Tajawal'; font-size: 16px; outline: none;
        }
        
        input:focus { border-color: var(--fire-core); }

        button {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: linear-gradient(45deg, var(--fire-core), var(--fire-glow));
            color: white; font-weight: 900; font-size: 19px; cursor: pointer;
            transition: 0.3s; box-shadow: 0 8px 20px rgba(255, 62, 0, 0.3);
        }

        button:active { transform: scale(0.98); }

        .logo-icon { font-size: 50px; margin-bottom: 15px; display: inline-block; }
        .toggle-btn { margin-top: 30px; font-size: 15px; color: #aaa; }
        .toggle-btn b { color: var(--gold-light); cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="dua-container">
            <p style="opacity: 0.8; font-size: 14px; margin-bottom: 10px;">جاري الاتصال بقاعدة البيانات..</p>
            <h3 style="color: var(--gold-light); margin: 15px 0; font-size: 24px; font-weight: 900;">قُصي وورده ❤️</h3>
            <p style="font-size: 13px; color: #ccc;">اللهم اجمع بينهم بالخير والحلال قريباً</p>
        </div>
        <a id="whatsapp-loader-btn" href="https://wa.me/972555630038?text=مرحباً، أحتاج مساعدة في تسجيل الدخول" target="_blank">
            <i class="fab fa-whatsapp"></i> تواصل مع الدعم الفني
        </a>
        <div class="progress-container"><div class="progress-bar"></div></div>
    </div>

    <div class="auth-card" id="login-box">
        <div class="logo-icon">🔑</div>
        <h2>عالم المصيبة</h2>
        <input type="text" id="user" placeholder="اسم المستخدم" autocomplete="off">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button onclick="executeLogin()">دخول آمن 🛡️</button>
        <div class="toggle-btn">ليس لديك حساب؟ <b onclick="toggle(true)">أنشئ حساباً</b></div>
    </div>

    <div class="auth-card" id="reg-box" style="display:none;">
        <div class="logo-icon">✨</div>
        <h2>انضم إلينا</h2>
        <input type="text" id="reg-user" placeholder="اسم المستخدم الجديد">
        <input type="email" id="reg-email" placeholder="البريد الإلكتروني">
        <input type="password" id="reg-pass" placeholder="اختر كلمة مرور">
        <button onclick="executeRegister()">تأكيد التسجيل</button>
        <div class="toggle-btn">لديك حساب بالفعل؟ <b onclick="toggle(false)">سجل دخولك</b></div>
    </div>

    <script>
        // إعدادات الفايربيز الخاصة بمشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyDH4h6Dg1DM9xGLc8x7mUaqnVICBf6HnNk",
            authDomain: "al-musaiba.firebaseapp.com",
            databaseURL: "https://al-musaiba-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "al-musaiba",
            storageBucket: "al-musaiba.firebasestorage.app",
            messagingSenderId: "693047037412",
            appId: "1:693047037412:web:9d3f3ab7831ac35cd80bf1"
        };

        // تشغيل الفايربيز
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function toggle(isReg) {
            document.getElementById('login-box').style.display = isReg ? 'none' : 'block';
            document.getElementById('reg-box').style.display = isReg ? 'block' : 'none';
        }

        // دالة تسجيل الدخول
        function executeLogin() {
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value.trim();

            if(!u || !p) return alert("يا غالي عبي البيانات!");
            
            document.getElementById('loader').style.display = 'flex';

            database.ref('users/' + u).once('value').then((snapshot) => {
                const userData = snapshot.val();
                if (userData && userData.password === p) {
                    if (userData.status === "محظور") {
                        alert("⚠️ حسابك محظور من الإدارة");
                        location.reload();
                    } else {
                        localStorage.setItem('user', u);
                        window.location.href = "services.html";
                    }
                } else {
                    alert("❌ خطأ في الاسم أو كلمة المرور");
                    document.getElementById('loader').style.display = 'none';
                }
            }).catch((error) => {
                alert("⚠️ مشكلة في الاتصال بالشبكة");
                document.getElementById('loader').style.display = 'none';
            });
        }

        // دالة إنشاء الحساب
        function executeRegister() {
            const u = document.getElementById('reg-user').value.trim().toLowerCase();
            const e = document.getElementById('reg-email').value.trim();
            const p = document.getElementById('reg-pass').value.trim();

            if(!u || !e || !p) return alert("كمل البيانات يا وحش!");
            
            document.getElementById('loader').style.display = 'flex';

            // فحص إذا المستخدم موجود مسبقاً
            database.ref('users/' + u).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    alert("❌ هذا الاسم محجوز، اختار غيره");
                    document.getElementById('loader').style.display = 'none';
                } else {
                    // إنشاء الحساب الجديد
                    database.ref('users/' + u).set({
                        username: u,
                        email: e,
                        password: p,
                        balance: 0,
                        status: "نشط",
                        joinDate: new Date().toISOString()
                    }).then(() => {
                        alert("✅ تم بنجاح! هسا سجل دخولك يا بطل.");
                        location.reload();
                    });
                }
            });
        }
    </script>
</body>
</html>
