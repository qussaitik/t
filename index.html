<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم المصيبة PRO | Al-Musaiba World</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* ألوان ثيم "النار والذهب" - فخامة نارية */
            --bg-deep: #0e0e12;       /* أسود بركاني عميق */
            --fire-core: #ff3e00;    /* قلب النار الأحمر */
            --fire-glow: #ff8c00;    /* وهج البرتقال */
            --gold-light: #ffd700;   /* ذهب لامع */
            --gold-dark: #ccac00;    /* ذهب معتق */
            --card-bg: rgba(0, 0, 0, 0.5); /* زجاج أسود شفاف */
            --text-main: #fff;
            --text-mute: #aaa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            /* خلفية متدرجة بركانية ناعمة وفخمة */
            background: radial-gradient(circle at center, #2c1a1a 0%, var(--bg-deep) 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
            position: relative;
        }

        /* إضافة لمسة وهج ناري خفيف في الخلفية */
        body::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 70% 30%, rgba(255, 62, 0, 0.08) 0%, rgba(0,0,0,0) 60%);
            z-index: -1;
        }

        /* لودر العمليات - بلمسة نارية */
        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.98); z-index: 9999; flex-direction: column;
            justify-content: center; align-items: center; backdrop-filter: blur(25px);
        }

        .progress-container {
            width: 280px; height: 6px; background: rgba(255, 255, 255, 0.03);
            border-radius: 10px; overflow: hidden; position: relative;
            border: 1px solid rgba(255, 255, 255, 0.03); margin-top: 20px;
        }

        .progress-bar {
            width: 100%; height: 100%; 
            /* تدرج ناري لشريط التحميل */
            background: linear-gradient(90deg, var(--fire-core), var(--fire-glow));
            border-radius: 10px; animation: progressAnim 12s linear forwards;
            box-shadow: 0 0 10px rgba(255, 62, 0, 0.5);
        }

        @keyframes progressAnim { from { width: 100%; } to { width: 0%; } }

        #whatsapp-loader-btn {
            display: inline-block; margin-top: 25px; background: #25d366; 
            color: white; padding: 12px 25px; border-radius: 50px; 
            text-decoration: none; font-weight: bold; font-size: 14px; 
            transition: 0.3s; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }

        .dua-container {
            margin-top: 15px; text-align: center; background: rgba(255,255,255,0.02);
            padding: 25px 45px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05);
        }

        /* كرت تسجيل الدخول - زجاج بركاني وفخم */
        .auth-card {
            background: var(--card-bg); 
            backdrop-filter: blur(35px); /* بلور عالي لفخامة الزجاج */
            padding: 55px 45px; border-radius: 30px; width: 92%;
            max-width: 410px; text-align: center; 
            /* حد رفيع ذهبي معتق */
            border: 1px solid rgba(255, 215, 0, 0.08); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            animation: fadeInUp 0.5s forwards;
            position: relative; overflow: hidden;
        }

        /* إضافة لمسة وهج ناري خفي للكرت */
        .auth-card::after {
            content: ''; position: absolute; bottom: -20px; right: -20px; width: 100px; height: 100px;
            background: radial-gradient(circle, rgba(255, 62, 0, 0.1) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { 
            font-weight: 900; font-size: 32px; margin-bottom: 40px; 
            letter-spacing: 1px;
            /* تدرج ناري فخم للعنوان */
            background: linear-gradient(135deg, var(--gold-light), #fff, var(--fire-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        .input-group { margin-bottom: 22px; position: relative; }
        input {
            width: 100%; padding: 19px; border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.03); 
            color: var(--text-main); text-align: center;
            font-family: 'Tajawal'; font-size: 16px; transition: 0.4s;
        }
        input:focus { 
            outline: none; 
            /* وهج ذهبي ناعم عند التركيز */
            border-color: rgba(255, 215, 0, 0.2); 
            background: rgba(255, 255, 255, 0.06); 
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.05);
        }

        /* زر "ناري" فخم جداً */
        button {
            width: 100%; padding: 19px; border-radius: 15px; border: none;
            /* تدرج ناري من الأحمر للبرتقالي الذهبي */
            background: linear-gradient(45deg, var(--fire-core), var(--fire-glow), var(--gold-dark));
            background-size: 200% 200%; /* عشان حركة التدرج */
            color: var(--bg-deep); /* نص غامق لفخامة التباين */
            font-weight: 900; font-size: 19px; cursor: pointer;
            transition: 0.5s; margin-top: 18px;
            box-shadow: 0 10px 25px rgba(255, 62, 0, 0.25);
            animation: gradientMove 3s ease infinite; /* حركة نارية للزر */
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        button:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 15px 30px rgba(255, 62, 0, 0.35);
            filter: brightness(1.1);
        }

        .toggle-btn { margin-top: 35px; font-size: 15px; color: var(--text-mute); }
        .toggle-btn b { 
            color: var(--gold-light); 
            cursor: pointer; text-decoration: underline; padding-right: 5px; 
            transition: 0.3s;
        }
        .toggle-btn b:hover { color: #fff; text-shadow: 0 0 5px var(--gold-light); }

        /* أيقونة اللوجو - بلمسة ذهبية بركانية */
        .logo-icon { 
            font-size: 55px; margin-bottom: 20px; display: inline-block; 
            animation: float 3s ease-in-out infinite; 
            /* تدرج ذهبي للأيقونة */
            background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.3));
        }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-10px) rotate(2deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="dua-container">
            <p style="opacity: 0.8; font-size: 14px; margin-bottom: 10px;">جاري فتح الموقع وتحديث الرصيد..</p>
            <h3 style="color: var(--gold-light); margin: 15px 0; font-size: 26px; font-weight: 900; text-shadow: 0 0 10px rgba(255,215,0,0.2);">قُصي وورده ❤️</h3>
            <p style="font-size: 13px; color: #ccc;">اللهم اجمع بينهم بالخير والحلال قريباً</p>
        </div>
        <a id="whatsapp-loader-btn" href="https://wa.me/972555630038?text=مرحباً، أحتاج مساعدة في تسجيل الدخول لعالم المصيبة" target="_blank">
            <i class="fab fa-whatsapp"></i> تواصل مع الدعم الفني
        </a>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>

    <div class="auth-card" id="login-box">
        <div class="logo-icon">🔑</div>
        <h2>عالم المصيبة</h2>
        <div class="input-group">
            <input type="text" id="user" placeholder="اسم المستخدم" autocomplete="off">
        </div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="كلمة المرور">
        </div>
        <button onclick="executeLogin()">دخول آمن 🛡️</button>
        <div class="toggle-btn">ليس لديك حساب؟ <b onclick="toggle(true)">أنشئ حساباً</b></div>
    </div>

    <div class="auth-card" id="reg-box" style="display:none;">
        <div class="logo-icon">✨</div>
        <h2>انضم إلينا</h2>
        <div class="input-group">
            <input type="text" id="reg-user" placeholder="اسم المستخدم الجديد">
        </div>
        <div class="input-group">
            <input type="email" id="reg-email" placeholder="البريد الإلكتروني">
        </div>
        <div class="input-group">
            <input type="password" id="reg-pass" placeholder="اختر كلمة مرور">
        </div>
        <button onclick="executeRegister()" style="background: linear-gradient(45deg, var(--fire-glow), var(--gold-light)); color: var(--bg-deep);">تأكيد التسجيل</button>
        <div class="toggle-btn">لديك حساب بالفعل؟ <b onclick="toggle(false)">سجل دخولك</b></div>
    </div>

    <script>
        // الرابط الخاص بجوجل شيت (الداتا بيس تبعتك) - لم ألمس أي شيء هنا
        const url = "https://script.google.com/macros/s/AKfycbzUEWbeyHTdG2Eu96NZxxJJHWToeLsuOh6VuF-fiTeEpK9JP1mceRVra6HFP2EoiPdo/exec";

        function toggle(isReg) {
            document.getElementById('login-box').style.display = isReg ? 'none' : 'block';
            document.getElementById('reg-box').style.display = isReg ? 'block' : 'none';
        }

        async function executeLogin() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            if(!u || !p) return alert("يا غالي عبي البيانات!");
            
            document.getElementById('loader').style.display = 'flex';
            try {
                const res = await fetch(url + "?action=getBalances");
                const data = await res.json();
                
                if(data[u]) {
                    if(String(data[u].password).trim() === String(p).trim()) {
                        if(data[u].status === "محظور") {
                            alert("⚠️ حسابك محظور، راجع الإدارة.");
                            location.reload();
                        } else {
                            localStorage.setItem('user', u);
                            window.location.href = "services.html"; // تأكد من وجود هذا الملف
                        }
                    } else {
                        alert("❌ كلمة المرور غير صحيحة!");
                        location.reload();
                    }
                } else {
                    alert("❌ المستخدم غير موجود!");
                    location.reload();
                }
            } catch(e) { 
                alert("⚠️ مشكلة في الشبكة، جرب مرة ثانية.");
                location.reload(); 
            }
        }

        async function executeRegister() {
            const u = document.getElementById('reg-user').value.trim();
            const e = document.getElementById('reg-email').value.trim();
            const p = document.getElementById('reg-pass').value.trim();
            if(!u || !e || !p) return alert("كمل البيانات يا بطل!");

            document.getElementById('loader').style.display = 'flex';
            try {
                const res = await fetch(url, {
                    method: "POST",
                    body: JSON.stringify({ action: "registerUser", user: u, email: e, pass: p })
                });
                const result = await res.text();
                if(result === "Success") {
                    alert("✅ تم إنشاء الحساب بنجاح! سجل دخولك الآن.");
                    location.reload();
                } else {
                    alert("❌ الاسم مستخدم من قبل، اختر اسماً آخر.");
                    document.getElementById('loader').style.display = 'none';
                }
            } catch(err) { 
                alert("⚠️ فشل التسجيل، جرب لاحقاً.");
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
