<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عالم المصيبة | تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #ff7675;
            --bg: #f8f9fd;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* لودر العمليات بلمسة فخمة */
        #loader {
            display: none; position: fixed; inset: 0;
            background: rgba(255, 255, 255, 0.95); z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }

        .dua-container {
            text-align: center; background: var(--white);
            padding: 30px; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(108, 92, 231, 0.1);
            border: 1px solid rgba(108, 92, 231, 0.1);
        }

        .auth-card {
            background: var(--white);
            padding: 45px 30px; border-radius: 35px; width: 100%;
            max-width: 400px; text-align: center;
            box-shadow: 0 25px 50px rgba(108, 92, 231, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.8);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h2 {
            font-weight: 900; font-size: 28px; margin-bottom: 30px;
            color: var(--primary);
        }

        .input-group { margin-bottom: 15px; position: relative; }
        
        input {
            width: 100%; padding: 16px 20px; border-radius: 18px;
            border: 2px solid #f1f1f1; background: #fafafa;
            color: #2d3436; text-align: center;
            font-family: 'Tajawal'; font-size: 16px; outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: var(--white); }

        button {
            width: 100%; padding: 16px; border-radius: 18px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-weight: 700; font-size: 18px; cursor: pointer;
            transition: 0.3s; box-shadow: 0 10px 20px rgba(108, 92, 231, 0.2);
            margin-top: 10px;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(108, 92, 231, 0.3); }

        .toggle-btn { margin-top: 25px; font-size: 14px; color: #b2bec3; }
        .toggle-btn b { color: var(--primary); cursor: pointer; text-decoration: underline; }

        .progress-bar {
            width: 200px; height: 4px; background: #eee;
            border-radius: 10px; margin-top: 20px; overflow: hidden;
        }
        .progress-line {
            width: 100%; height: 100%; background: var(--primary);
            animation: loading 2s infinite;
        }
        @keyframes loading { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="dua-container">
            <h3 style="color: var(--primary); margin-bottom: 10px; font-size: 22px; font-weight: 900;">قُصي وورده ❤️</h3>
            <p style="font-size: 13px; color: #636e72;">اللهم اجمع بينهم بالخير والحلال قريباً</p>
            <div class="progress-bar"><div class="progress-line"></div></div>
        </div>
    </div>

    <div class="auth-card" id="login-box">
        <div style="font-size: 50px; margin-bottom: 15px;">🔒</div>
        <h2>عالم المصيبة</h2>
        <div class="input-group">
            <input type="text" id="user" placeholder="اسم المستخدم" autocomplete="off">
        </div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="كلمة المرور">
        </div>
        <button onclick="executeLogin()">دخول آمن 🛡️</button>
        <div class="toggle-btn">ليس لديك حساب؟ <b onclick="toggle(true)">أنشئ حساباً جديداً</b></div>
    </div>

    <div class="auth-card" id="reg-box" style="display:none;">
        <div style="font-size: 50px; margin-bottom: 15px;">✨</div>
        <h2>انضم إلينا</h2>
        <div class="input-group">
            <input type="text" id="reg-user" placeholder="اسم المستخدم الجديد">
        </div>
        <div class="input-group">
            <input type="email" id="reg-email" placeholder="البريد الإلكتروني">
        </div>
        <div class="input-group">
            <input type="password" id="reg-pass" placeholder="اختر كلمة مرور">
        </div>
        <button onclick="executeRegister()">تأكيد التسجيل</button>
        <div class="toggle-btn">لديك حساب بالفعل؟ <b onclick="toggle(false)">سجل دخولك</b></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDH4h6Dg1DM9xGLc8x7mUaqnVICBf6HnNk",
            authDomain: "al-musaiba.firebaseapp.com",
            databaseURL: "https://al-musaiba-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "al-musaiba",
            storageBucket: "al-musaiba.firebasestorage.app",
            messagingSenderId: "693047037412",
            appId: "1:693047037412:web:9d3f3ab7831ac35cd80bf1"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function toggle(isReg) {
            document.getElementById('login-box').style.display = isReg ? 'none' : 'block';
            document.getElementById('reg-box').style.display = isReg ? 'block' : 'none';
        }

        function executeLogin() {
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value.trim();

            if(!u || !p) return alert("يرجى إدخال كافة البيانات!");
            
            document.getElementById('loader').style.display = 'flex';

            database.ref('users/' + u).once('value').then((snapshot) => {
                const userData = snapshot.val();
                if (userData && userData.password === p) {
                    if (userData.status === "محظور") {
                        alert("⚠️ حسابك محظور من قبل الإدارة");
                        location.reload();
                    } else {
                        localStorage.setItem('user', u);
                        // تأكد أن هذا الاسم يطابق اسم ملف الخدمات لديك
                        window.location.href = "services.html";
                    }
                } else {
                    alert("❌ خطأ في اسم المستخدم أو كلمة المرور");
                    document.getElementById('loader').style.display = 'none';
                }
            }).catch(() => {
                alert("⚠️ مشكلة في الاتصال بالشبكة");
                document.getElementById('loader').style.display = 'none';
            });
        }

        function executeRegister() {
            const u = document.getElementById('reg-user').value.trim().toLowerCase();
            const e = document.getElementById('reg-email').value.trim();
            const p = document.getElementById('reg-pass').value.trim();

            if(!u || !e || !p) return alert("يرجى إكمال البيانات!");
            
            document.getElementById('loader').style.display = 'flex';

            database.ref('users/' + u).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    alert("❌ هذا الاسم محجوز بالفعل");
                    document.getElementById('loader').style.display = 'none';
                } else {
                    database.ref('users/' + u).set({
                        username: u, email: e, password: p, balance: 0,
                        status: "نشط", joinDate: new Date().toISOString()
                    }).then(() => {
                        alert("✅ تم إنشاء الحساب بنجاح!");
                        location.reload();
                    });
                }
            });
        }
    </script>
</body>
</html>
