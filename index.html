<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم المصيبة | Al-Musaiba World</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00cec9;
            --accent: #e84393;
            --bg: #1a1c2c; 
            --card-bg: rgba(255, 255, 255, 0.06);
            --w: #25d366; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #1a1c2c 0%, #4a194c 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* لودر العمليات اللي بيظهر عند الضغط على "دخول" أو "تسجيل" */
        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 28, 44, 0.98); z-index: 9999; flex-direction: column;
            justify-content: center; align-items: center; backdrop-filter: blur(25px);
        }

        .progress-container {
            width: 280px; height: 6px; background: rgba(255, 255, 255, 0.05);
            border-radius: 10px; overflow: hidden; position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05); margin-top: 20px;
        }

        .progress-bar {
            width: 100%; height: 100%; background: var(--secondary);
            border-radius: 10px; animation: progressAnim 12s linear forwards;
        }

        @keyframes progressAnim { from { width: 100%; } to { width: 0%; } }

        #whatsapp-loader-btn {
            display: inline-block; margin-top: 25px; background: var(--w); 
            color: white; padding: 12px 25px; border-radius: 50px; 
            text-decoration: none; font-weight: bold; font-size: 14px; 
            transition: 0.3s; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }

        .dua-container {
            margin-top: 15px; text-align: center; background: rgba(255,255,255,0.05);
            padding: 20px 40px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
        }

        /* الكرت الزجاجي (لوحة الدخول) */
        .auth-card {
            background: var(--card-bg); backdrop-filter: blur(25px);
            padding: 50px 40px; border-radius: 35px; width: 92%;
            max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeInUp 0.5s forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { font-weight: 900; font-size: 30px; margin-bottom: 35px; letter-spacing: 1px; }
        .input-group { margin-bottom: 20px; position: relative; }
        input {
            width: 100%; padding: 18px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.06); color: white; text-align: center;
            font-family: 'Tajawal'; font-size: 16px; transition: 0.4s;
        }
        input:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.12); }

        button {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; font-weight: 900; font-size: 19px; cursor: pointer;
            transition: 0.4s; margin-top: 15px;
        }
        button:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .toggle-btn { margin-top: 30px; font-size: 15px; color: #a0a0a0; }
        .toggle-btn b { color: var(--secondary); cursor: pointer; text-decoration: underline; padding-right: 5px; }
        .logo-icon { font-size: 50px; margin-bottom: 15px; display: inline-block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="dua-container">
            <p style="opacity: 0.8; font-size: 14px; margin-bottom: 10px;">جاري فتح الموقع وتحديث الرصيد..</p>
            <h3 style="color: var(--secondary); margin: 15px 0; font-size: 24px; font-weight: 900;">قُصي وورده ❤️</h3>
            <p style="font-size: 13px; color: #ccc;">اللهم اجمع بينهم بالخير والحلال قريباً</p>
        </div>
        <a id="whatsapp-loader-btn" href="https://wa.me/972555630038?text=مرحباً، أحتاج مساعدة في تسجيل الدخول لعالم المصيبة" target="_blank">
            <i class="fab fa-whatsapp"></i> تواصل مع الدعم الفني
        </a>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>

    <div class="auth-card" id="login-box">
        <div class="logo-icon">🔑</div>
        <h2>عالم المصيبة</h2>
        <div class="input-group">
            <input type="text" id="user" placeholder="اسم المستخدم" autocomplete="off">
        </div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="كلمة المرور">
        </div>
        <button onclick="executeLogin()">دخول آمن 🛡️</button>
        <div class="toggle-btn">ليس لديك حساب؟ <b onclick="toggle(true)">أنشئ حساباً</b></div>
    </div>

    <div class="auth-card" id="reg-box" style="display:none;">
        <div class="logo-icon">✨</div>
        <h2>انضم إلينا</h2>
        <div class="input-group">
            <input type="text" id="reg-user" placeholder="اسم المستخدم الجديد">
        </div>
        <div class="input-group">
            <input type="email" id="reg-email" placeholder="البريد الإلكتروني">
        </div>
        <div class="input-group">
            <input type="password" id="reg-pass" placeholder="اختر كلمة مرور">
        </div>
        <button onclick="executeRegister()" style="background: linear-gradient(45deg, var(--secondary), #55efc4);">تأكيد التسجيل</button>
        <div class="toggle-btn">لديك حساب بالفعل؟ <b onclick="toggle(false)">سجل دخولك</b></div>
    </div>

    <script>
        // الرابط الخاص بجوجل شيت (الداتا بيس تبعتك)
        const url = "https://script.google.com/macros/s/AKfycbzUEWbeyHTdG2Eu96NZxxJJHWToeLsuOh6VuF-fiTeEpK9JP1mceRVra6HFP2EoiPdo/exec";

        function toggle(isReg) {
            document.getElementById('login-box').style.display = isReg ? 'none' : 'block';
            document.getElementById('reg-box').style.display = isReg ? 'block' : 'none';
        }

        async function executeLogin() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            if(!u || !p) return alert("يا غالي عبي البيانات!");
            
            document.getElementById('loader').style.display = 'flex';
            try {
                const res = await fetch(url + "?action=getBalances");
                const data = await res.json();
                
                if(data[u]) {
                    if(String(data[u].password).trim() === String(p).trim()) {
                        if(data[u].status === "محظور") {
                            alert("⚠️ حسابك محظور، راجع الإدارة.");
                            location.reload();
                        } else {
                            localStorage.setItem('user', u);
                            window.location.href = "services.html"; // تأكد من وجود هذا الملف
                        }
                    } else {
                        alert("❌ كلمة المرور غير صحيحة!");
                        location.reload();
                    }
                } else {
                    alert("❌ المستخدم غير موجود!");
                    location.reload();
                }
            } catch(e) { 
                alert("⚠️ مشكلة في الشبكة، جرب مرة ثانية.");
                location.reload(); 
            }
        }

        async function executeRegister() {
            const u = document.getElementById('reg-user').value.trim();
            const e = document.getElementById('reg-email').value.trim();
            const p = document.getElementById('reg-pass').value.trim();
            if(!u || !e || !p) return alert("كمل البيانات يا بطل!");

            document.getElementById('loader').style.display = 'flex';
            try {
                const res = await fetch(url, {
                    method: "POST",
                    body: JSON.stringify({ action: "registerUser", user: u, email: e, pass: p })
                });
                const result = await res.text();
                if(result === "Success") {
                    alert("✅ تم إنشاء الحساب بنجاح! سجل دخولك الآن.");
                    location.reload();
                } else {
                    alert("❌ الاسم مستخدم من قبل، اختر اسماً آخر.");
                    document.getElementById('loader').style.display = 'none';
                }
            } catch(err) { 
                alert("⚠️ فشل التسجيل، جرب لاحقاً.");
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
